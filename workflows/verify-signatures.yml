
name: 🔐 Verificar firmas GPG en PRs

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  verify-gpg:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Verificar firmas GPG
      run: |
        if git log --show-signature -1 | grep -q 'Good signature'; then
          echo "✅ Firma GPG válida"
        else
          echo "❌ Firma GPG NO válida"
          exit 1
        fi
